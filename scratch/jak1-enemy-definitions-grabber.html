<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jak 1 Enemy Definitions Grabber</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 24px; min-height: 100vh; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #fff; }
.sub { font-size: 13px; color: #888; margin-bottom: 20px; }
.proxy-row { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
.proxy-row strong { color: #999; display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
.proxy-status { display: flex; gap: 8px; flex-wrap: wrap; }
.ps { padding: 3px 10px; border-radius: 4px; font-size: 11px; }
.ps-pending  { background:#2a2a2a; color:#666; border:1px solid #444; }
.ps-testing  { background:#1a3a5c; color:#7bb3e0; border:1px solid #2a5a8c; }
.ps-ok       { background:#1a3a24; color:#6fcf97; border:1px solid #2a5a3a; }
.ps-fail     { background:#3a1a1a; color:#eb5757; border:1px solid #5a2a2a; }
.controls { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
button { background:#2a2a2a; border:1px solid #444; color:#e0e0e0; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; }
button:hover:not(:disabled) { background:#333; }
button:disabled { opacity:0.4; cursor:default; }
button.primary { background:#1a5c9e; border-color:#2a7cd4; color:#fff; }
button.primary:hover:not(:disabled) { background:#1e6db5; }
#log { background:#111; border:1px solid #333; border-radius:8px; padding:14px; font-family:monospace; font-size:12px; height:130px; overflow-y:auto; margin-bottom:16px; }
.log-line { padding:1px 0; line-height:1.5; }
.log-ok   { color:#6fcf97; }
.log-err  { color:#eb5757; }
.log-info { color:#9b9b9b; }
.log-warn { color:#f2c94c; }
.progress-bar { height:3px; background:#333; border-radius:2px; margin-bottom:16px; overflow:hidden; }
.progress-fill { height:100%; background:#1a7cd4; border-radius:2px; transition:width 0.3s; width:0%; }
.stats { display:flex; gap:10px; margin-bottom:16px; }
.stat { background:#222; border:1px solid #333; border-radius:8px; padding:10px 14px; flex:1; }
.stat-val { font-size:22px; font-weight:600; color:#fff; }
.stat-lbl { font-size:11px; color:#666; margin-top:2px; }
.enemy-list { display:flex; flex-direction:column; gap:10px; }
.ecard { background:#222; border:1px solid #333; border-radius:8px; padding:14px 16px; }
.ecard.done  { border-color:#2a5a3a; }
.ecard.error { border-color:#4a2a2a; }
.ecard-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:12px; }
.ecard-title { font-size:14px; font-weight:500; color:#ddd; }
.ecard-meta  { font-size:11px; color:#555; font-family:monospace; margin-top:2px; }
.ecard-badge { font-size:10px; padding:2px 8px; border-radius:3px; white-space:nowrap; flex-shrink:0; }
.badge-ok  { background:#1a3a24; color:#6fcf97; border:1px solid #2a5a3a; }
.badge-err { background:#3a1a1a; color:#eb5757; border:1px solid #5a2a2a; }
.badge-load{ background:#2a2a2a; color:#666; border:1px solid #444; }
.ecard-text { font-size:13px; color:#bbb; line-height:1.7; white-space:pre-wrap; }
.ecard-url  { font-size:11px; color:#555; margin-top:6px; }
.ecard-url a { color:#4a8ccc; text-decoration:none; }
.ecard-url a:hover { text-decoration:underline; }
</style>
</head>
<body>

<h1>Jak 1 Enemy Definitions Grabber</h1>
<p class="sub">Pulls the intro section from each enemy's Fandom wiki page — the full descriptive text you see before the Contents table. Downloads as JSON + CSV.</p>

<div class="proxy-row">
  <strong>Proxy status</strong>
  <div class="proxy-status" id="proxy-status"></div>
</div>

<div class="controls">
  <button class="primary" id="btn-fetch" onclick="startFetch()">Fetch all definitions</button>
  <button id="btn-dl-json" onclick="downloadJSON()" disabled>Download JSON</button>
  <button id="btn-dl-csv"  onclick="downloadCSV()"  disabled>Download CSV</button>
  <button onclick="clearAll()">Clear</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">enemies</div></div>
  <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">fetched</div></div>
  <div class="stat"><div class="stat-val" id="s-found">0</div><div class="stat-lbl">found</div></div>
  <div class="stat"><div class="stat-val" id="s-err">0</div><div class="stat-lbl">not found</div></div>
</div>

<div id="log"></div>
<div class="enemy-list" id="list"></div>

<script>
const FANDOM_API = 'https://jakanddaxter.fandom.com/api.php';

// wiki: exact article title on jakanddaxter.fandom.com
// code: OpenGOAL source filename
// Try alternate titles if primary fails (listed in order)
const ENEMIES = [
  { wiki:'Babak',                    alts:['Babak (lurker)'],                              code:'babak',                  level:'All hubs' },
  { wiki:'Bone armor lurker',        alts:[],                                              code:'bonelurker',             level:'Misty Island' },
  { wiki:'Quicksand lurker',         alts:[],                                              code:'quicksandlurker',        level:'Misty Island' },
  { wiki:'Balloon lurker',           alts:['Lurker balloon'],                              code:'balloonlurker',          level:'Misty Island' },
  { wiki:'Lurker puppy',             alts:['Lurker dog'],                                  code:'lurkerpuppy',            level:'Sentinel Beach' },
  { wiki:'Lurker crab',              alts:[],                                              code:'lurkercrab',             level:'Sentinel Beach' },
  { wiki:'Lurker worm',              alts:['Sand worm'],                                   code:'lurkerworm',             level:'Sentinel Beach' },
  { wiki:'Hopper (Jak and Daxter)', alts:['Hopper'],                                      code:'hopper',                 level:'Forbidden Jungle' },
  { wiki:'Jungle snake',             alts:['Lurker snake'],                                code:'junglesnake',            level:'Forbidden Jungle' },
  { wiki:'Jungle fish',              alts:['Lurker fish'],                                 code:'junglefish',             level:'Forbidden Jungle' },
  { wiki:'Aphid lurker',             alts:['Aphid'],                                       code:'aphid',                  level:'Forbidden Temple' },
  { wiki:'Dark eco plant',           alts:['Eco plant'],                                   code:'plant-boss',             level:'Forbidden Temple' },
  { wiki:'Double lurker',            alts:[],                                              code:'double-lurker',          level:'Lost Precursor City' },
  { wiki:'Puffer',                   alts:['Puffer (Jak and Daxter)','Poisonous puffer'],  code:'puffer',                 level:'Lost Precursor City' },
  { wiki:'Bully',                    alts:['Bully (Jak and Daxter)'],                      code:'bully',                  level:'Lost Precursor City' },
  { wiki:'Swamp rat',                alts:[],                                              code:'swamp-rat',              level:'Boggy Swamp' },
  { wiki:'Swamp bat',                alts:[],                                              code:'swamp-bat',              level:'Boggy Swamp' },
  { wiki:'Lurker toad',              alts:['Kermit','Toad lurker'],                        code:'kermit',                 level:'Boggy Swamp' },
  { wiki:'Lurker frog',              alts:['Billy','Frog lurker'],                         code:'billy',                  level:'Boggy Swamp' },
  { wiki:'Driller lurker',           alts:['Ice driller'],                                 code:'driller-lurker',         level:'Spider Cave / Snowy Mtn' },
  { wiki:'Baby spider',              alts:['Baby spider (lurker)'],                        code:'baby-spider',            level:'Spider Cave' },
  { wiki:'Mother spider',            alts:['Mother spider (lurker)'],                      code:'mother-spider',          level:'Spider Cave' },
  { wiki:'Gnawing lurker',           alts:['Gnawer'],                                      code:'gnawer',                 level:'Spider Cave' },
  { wiki:'Snow bunny',               alts:[],                                              code:'snow-bunny',             level:'Snowy Mountain' },
  { wiki:'Yeti',                     alts:['Yeti (Jak and Daxter)'],                       code:'yeti',                   level:'Snowy Mountain' },
  { wiki:'Ice lurker',               alts:['Glacier troop','Snow ram'],                    code:'snow-ram-boss',          level:'Snowy Mountain' },
  { wiki:'Pedal-copter lurker',      alts:['Flying lurker','Pedal copter lurker'],         code:'flying-lurker',          level:'Mountain Pass' },
  { wiki:'Klaww',                    alts:[],                                              code:'ogreboss',               level:'Mountain Pass (Boss)' },
  { wiki:'Robber',                   alts:['Robber (Jak and Daxter)'],                     code:'rolling-robber',         level:'Precursor Basin' },
  { wiki:'Lightning mole',           alts:['Rolling lightning mole'],                      code:'rolling-lightning-mole', level:'Precursor Basin' },
  { wiki:'Lurker shark',             alts:[],                                              code:'lurker-shark',           level:'Ocean border' },
  { wiki:'Green eco lurker',         alts:[],                                              code:'green-eco-lurker',       level:'Final Boss' },
  { wiki:'Precursor robot',          alts:['Robot boss','Precursor Robot'],                code:'robotboss',              level:'Final Boss' },
];

const PROXIES = [
  { name:'allorigins', wrap: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name:'corsproxy',  wrap: u => `https://corsproxy.io/?url=${encodeURIComponent(u)}` },
  { name:'codetabs',   wrap: u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}` },
  { name:'thingproxy', wrap: u => `https://thingproxy.freeboard.io/fetch/${u}` },
  { name:'htmldriven', wrap: u => `https://cors-proxy.htmldriven.com/?url=${encodeURIComponent(u)}` },
];

let workingProxy = null;
let results = [];
let doneCount=0, foundCount=0, errCount=0;

// ── Logging ──────────────────────────────────────────────────────────────────
function log(msg, cls='log-info') {
  const d = document.getElementById('log');
  const el = document.createElement('div');
  el.className = 'log-line '+cls;
  el.textContent = new Date().toLocaleTimeString()+' '+msg;
  d.appendChild(el); d.scrollTop = d.scrollHeight;
}
function setP(p){ document.getElementById('progress').style.width=Math.min(100,p)+'%'; }
function updateStats(){
  document.getElementById('s-total').textContent = ENEMIES.length;
  document.getElementById('s-done').textContent  = doneCount;
  document.getElementById('s-found').textContent = foundCount;
  document.getElementById('s-err').textContent   = errCount;
}

// ── Proxy management ─────────────────────────────────────────────────────────
function initProxyUI(){
  const el = document.getElementById('proxy-status');
  el.innerHTML='';
  PROXIES.forEach(p=>{
    const s=document.createElement('span');
    s.className='ps ps-pending'; s.id='ps-'+p.name; s.textContent=p.name;
    el.appendChild(s);
  });
}
function setPS(name,status){
  const el=document.getElementById('ps-'+name); if(!el)return;
  el.className='ps ps-'+status;
  if(status==='ok')   el.textContent=name+' ✓';
  if(status==='fail') el.textContent=name+' ✗';
  if(status==='testing') el.textContent=name+' …';
}

async function proxyFetch(url, proxy){
  const r = await fetch(proxy.wrap(url),{signal:AbortSignal.timeout(10000)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const text = await r.text();
  try{ const j=JSON.parse(text); if(j.contents) return j.contents; }catch(_){}
  return text;
}

async function testProxy(proxy){
  setPS(proxy.name,'testing');
  try{
    const text = await proxyFetch(FANDOM_API+'?action=query&meta=siteinfo&siprop=general&format=json', proxy);
    const data = JSON.parse(text);
    if(data?.query?.general?.sitename){ setPS(proxy.name,'ok'); return true; }
    throw new Error('bad');
  }catch(e){ setPS(proxy.name,'fail'); return false; }
}

async function findProxy(){
  log('Testing CORS proxies...','log-info');
  for(const p of PROXIES){
    if(await testProxy(p)){ log('Using: '+p.name,'log-ok'); return p; }
  }
  return null;
}

// ── Wiki wikitext cleaner ─────────────────────────────────────────────────────
// Strips wiki markup and returns clean readable text
function cleanWikitext(raw){
  let t = raw;

  // Remove <ref>...</ref> and <ref ... /> citation tags entirely
  t = t.replace(/<ref[^>]*>[\s\S]*?<\/ref>/gi,'');
  t = t.replace(/<ref[^/]*\/>/gi,'');

  // Remove infobox templates {{...}} - greedy match for nested braces
  // We do multiple passes since templates can be nested
  for(let i=0;i<5;i++) t = t.replace(/\{\{[^{}]*\}\}/g,'');

  // Remove remaining {{ blocks (deeply nested)
  t = t.replace(/\{\{[\s\S]*?\}\}/g,'');

  // Convert wikilinks [[Target|Display]] → Display, [[Target]] → Target
  t = t.replace(/\[\[(?:[^\]|]*\|)?([^\]]*)\]\]/g,'$1');

  // Remove external links [http... text] → text, bare [http...] → ''
  t = t.replace(/\[https?:\/\/[^\s\]]+\s+([^\]]+)\]/g,'$1');
  t = t.replace(/\[https?:\/\/[^\]]+\]/g,'');

  // Remove file/image embeds [[File:...]]
  t = t.replace(/\[\[(?:File|Image):[^\]]*\]\]/gi,'');

  // Remove bold/italic markup
  t = t.replace(/'{2,3}/g,'');

  // Remove section headers (== Heading ==)
  t = t.replace(/^=+[^=]+=+\s*$/gm,'');

  // Remove HTML tags
  t = t.replace(/<[^>]+>/g,'');

  // Remove HTML entities
  t = t.replace(/&nbsp;/g,' ');
  t = t.replace(/&amp;/g,'&');
  t = t.replace(/&lt;/g,'<');
  t = t.replace(/&gt;/g,'>');
  t = t.replace(/&#\d+;/g,'');

  // Remove wiki table syntax
  t = t.replace(/^\{\|.*$/gm,'');
  t = t.replace(/^\|\}.*$/gm,'');
  t = t.replace(/^\|\-.*$/gm,'');
  t = t.replace(/^\!.*$/gm,'');
  t = t.replace(/^\|.*$/gm,'');

  // Collapse multiple blank lines to max 2
  t = t.replace(/\n{3,}/g,'\n\n');

  // Trim
  t = t.trim();

  return t;
}

// ── Fetch one enemy definition ────────────────────────────────────────────────
// Uses parse API with prop=wikitext&section=0 — gets ONLY the intro section
// as raw wikitext, which we then clean. This gives full intro paragraphs.
async function fetchDef(wikiTitle){
  const url = FANDOM_API+'?'+new URLSearchParams({
    action:'parse',
    page: wikiTitle,
    prop:'wikitext',
    section:'0',       // section 0 = everything before first heading
    redirects:'true',
    format:'json'
  });
  const text = await proxyFetch(url, workingProxy);
  const data = JSON.parse(text);

  if(data.error || !data.parse){
    return { found:false, tried:wikiTitle };
  }

  const raw = data.parse.wikitext['*'] || '';
  const clean = cleanWikitext(raw);
  const title = data.parse.title;
  const pageId = data.parse.pageid;

  // Split into paragraphs, remove empty ones
  const paragraphs = clean.split('\n\n').map(p=>p.trim()).filter(p=>p.length>20);

  return {
    found: true,
    title,
    pageId,
    wikiUrl: 'https://jakanddaxter.fandom.com/wiki/' + encodeURIComponent(title.replace(/ /g,'_')),
    fullText: paragraphs.join('\n\n'),
    paragraphs,
    shortDesc: paragraphs[0] || ''
  };
}

// Try primary title then alternates
async function fetchWithFallback(enemy){
  const titles = [enemy.wiki, ...enemy.alts];
  for(const title of titles){
    try{
      const result = await fetchDef(title);
      if(result.found) return result;
      log(`  "${title}" — not found, trying next...`,'log-warn');
    }catch(e){
      log(`  "${title}" — error: ${e.message}`,'log-warn');
    }
    await new Promise(r=>setTimeout(r,200));
  }
  return { found:false, tried: titles.join(', ') };
}

// ── Render card ───────────────────────────────────────────────────────────────
function renderCard(enemy, info){
  const card = document.createElement('div');
  card.className = 'ecard '+(info?.found ? 'done' : 'error');

  const header = document.createElement('div');
  header.className = 'ecard-header';

  const left = document.createElement('div');
  left.innerHTML = `<div class="ecard-title">${enemy.wiki}</div><div class="ecard-meta">${enemy.code} · ${enemy.level}</div>`;

  const badge = document.createElement('span');
  badge.className = 'ecard-badge '+(info?.found ? 'badge-ok' : 'badge-err');
  badge.textContent = info?.found ? 'found' : 'not found';

  header.appendChild(left);
  header.appendChild(badge);
  card.appendChild(header);

  if(info?.found){
    const text = document.createElement('div');
    text.className = 'ecard-text';
    text.textContent = info.fullText;
    card.appendChild(text);

    const urlDiv = document.createElement('div');
    urlDiv.className = 'ecard-url';
    urlDiv.innerHTML = `<a href="${info.wikiUrl}" target="_blank" rel="noopener">→ ${info.wikiUrl}</a>`;
    card.appendChild(urlDiv);
  } else {
    const text = document.createElement('div');
    text.className = 'ecard-text';
    text.style.color = '#555';
    text.textContent = 'Tried: '+info?.tried;
    card.appendChild(text);
  }

  document.getElementById('list').appendChild(card);
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function startFetch(){
  document.getElementById('btn-fetch').disabled=true;
  document.getElementById('btn-dl-json').disabled=true;
  document.getElementById('btn-dl-csv').disabled=true;
  document.getElementById('list').innerHTML='';
  document.getElementById('log').innerHTML='';
  results=[]; doneCount=0; foundCount=0; errCount=0;
  updateStats(); setP(2); initProxyUI();

  workingProxy = await findProxy();
  if(!workingProxy){
    log('All proxies failed. Try disabling VPN/extensions.','log-err');
    document.getElementById('btn-fetch').disabled=false;
    return;
  }

  log(`Fetching ${ENEMIES.length} enemy definitions...`,'log-info');
  setP(10);

  for(let i=0;i<ENEMIES.length;i++){
    const enemy = ENEMIES[i];
    log(`[${i+1}/${ENEMIES.length}] ${enemy.wiki}`,'log-info');

    const info = await fetchWithFallback(enemy);
    const result = { ...enemy, ...info };
    results.push(result);
    doneCount++;
    if(info.found) foundCount++; else errCount++;
    updateStats();
    renderCard(enemy, info);
    setP(10 + (i/ENEMIES.length)*88);

    await new Promise(r=>setTimeout(r,350)); // polite rate limiting
  }

  setP(100);
  log(`Done. ${foundCount}/${ENEMIES.length} definitions retrieved.`,'log-ok');
  document.getElementById('btn-fetch').disabled=false;
  if(foundCount>0){
    document.getElementById('btn-dl-json').disabled=false;
    document.getElementById('btn-dl-csv').disabled=false;
  }
}

// ── Downloads ─────────────────────────────────────────────────────────────────
function downloadJSON(){
  const data = results.map(r=>({
    wiki_title:   r.title || r.wiki,
    code_name:    r.code,
    level:        r.level,
    found:        r.found,
    wiki_url:     r.wikiUrl || '',
    short_desc:   r.shortDesc || '',
    full_text:    r.fullText || '',
    paragraphs:   r.paragraphs || [],
    wiki_page_id: r.pageId || null
  }));
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='jak1-enemy-definitions.json'; a.click();
  log('JSON downloaded.','log-ok');
}

function downloadCSV(){
  const esc = s => '"'+(s||'').replace(/"/g,"'").replace(/\n/g,' ')+'"';
  const rows = [['wiki_title','code_name','level','found','short_desc','full_text','wiki_url']];
  for(const r of results){
    rows.push([esc(r.title||r.wiki), esc(r.code), esc(r.level), r.found?'true':'false',
               esc(r.shortDesc), esc(r.fullText), esc(r.wikiUrl)]);
  }
  const blob = new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='jak1-enemy-definitions.csv'; a.click();
  log('CSV downloaded.','log-ok');
}

function clearAll(){
  document.getElementById('list').innerHTML='';
  document.getElementById('log').innerHTML='';
  document.getElementById('proxy-status').innerHTML='';
  results=[]; doneCount=0; foundCount=0; errCount=0;
  workingProxy=null;
  updateStats(); setP(0);
  document.getElementById('btn-dl-json').disabled=true;
  document.getElementById('btn-dl-csv').disabled=true;
}

initProxyUI(); updateStats();
</script>
</body>
</html>
